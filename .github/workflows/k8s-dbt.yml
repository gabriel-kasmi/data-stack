name: Build and Push K8s DBT

on:
  push:
    paths:
      - 'k8s/src/dbt/**'
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: k8s/src/dbt
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/dbt:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/dbt:${{ github.sha }}
