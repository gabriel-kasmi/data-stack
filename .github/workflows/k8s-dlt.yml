name: Build and Push K8s DLT

on:
  push:
    paths:
      - 'k8s/src/dlt/**'
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: k8s/src/dlt
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/dlt:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/dlt:${{ github.sha }}
